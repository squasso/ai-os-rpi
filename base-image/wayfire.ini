[core]
plugins = autostart resize move place decoration zoom grid

[output]
mode = auto

[autostart]
# AI-OS shell — si avvia all'accensione del compositor Wayland
ai-shell = /usr/local/bin/ai-shell

# Sfondo desktop (colore solido come fallback)
background = swaybg -c "#1a1a2e" -m solid_color

[decoration]
# Nessuna decorazione: ai-shell è fullscreen senza bordi
ignore_views = title:AI-OS

[place]
mode = cascade

[input]
xkb_layout = it
natural_scroll = false
tap_to_click  = true

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[zoom]
modifier = <super>
speed    = 0.02
